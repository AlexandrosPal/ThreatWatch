<html><head><style>
    body{margin:0;padding:0;background:#f4f7fb;font-family:Arial,sans-serif;color:#172033}
    .outer{padding:20px}
    .wrap{max-width:680px;margin:auto}
    .brand{margin-bottom:14px}
    .brand-title{font-size:24px;font-weight:700}
    .brand-sub{font-size:13px;color:#667085}
    .panel{background:#fff;border:1px solid #e5eaf2;border-radius:16px;padding:20px}
    .header{margin-bottom:10px}
    .header-title{font-size:20px;font-weight:600;margin:0}
    .header-text{font-size:13px;color:#667085;margin-top:6px}
    .card{border:1px solid #eef2f7;border-radius:12px;padding:12px;margin-bottom:8px}
    .title{font-size:14px;font-weight:600}
    .meta{font-size:11px;color:#98a2b3;margin-top:4px}
    .badge{display:inline-block;color:#fff;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:600;margin-top:6px}
    .score{margin-left:6px;font-size:12px}
    .desc{font-size:13px;margin-top:8px;color:#344054}
    .link{font-size:12px;color:#2563eb;text-decoration:none}
    .footer{font-size:11px;color:#98a2b3;margin-top:16px}
</style></head><body>
<div class="outer"><div class="wrap">
    <div class="brand"><div class="brand-title">ThreatWatch</div><div class="brand-sub">Self-hosted vulnerability monitoring</div></div>
    <div class="panel">
        <div class="header"><div class="header-title">🚨 New Vulnerabilities Detected</div></div>
        <div class="header-text">Latest vulnerabilities for your monitored technologies.</div><br />
        <div>{{cveList}}</div>
        <div class="footer">ThreatWatch • Automated Security • Alerts This product uses the NVD API but is not endorsed or certified by the NVD.</div>
    </div></div></div>
</body></html>
